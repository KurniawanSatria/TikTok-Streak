name: Run Node Cron

on:
  schedule:
    - cron: '0 22 * * *'
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm install

      - name: Create JSON file
        run: |
          cat <<EOF > cookies.json
          ${{ secrets.COOKIES_JSON }}
          EOF

      - run: node index.js
